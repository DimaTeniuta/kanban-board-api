version: '3.7'

services:
   app:
    container_name: kanban
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '${APP_PORT}:${APP_PORT}'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/prisma/__generated__
    depends_on:
      - postgres
      - redis
    restart: always
    env_file:
      - .env
    networks:
      - backend
    command: yarn start:dev

   postgres:
    container_name: postgres
    image: postgres:15.2
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: always

   redis:
    container_name: redis
    image: redis:5.0
    ports:
      - '${REDIS_PORT}:6379'
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: always

volumes:
  postgres_data:
  redis_data:

networks:
  backend:

